<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World – coofygo</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #87ceeb; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.8rem;
      padding: 8px 18px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      pointer-events: none;
      transition: opacity 1s;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #1a2a3a;
      color: #87ceeb;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      z-index: 10;
      transition: opacity 0.6s;
    }
  </style>
</head>
<body>
  <div id="loading">Loading forest…</div>
  <div id="hint">↑ / ↓ walk &nbsp;·&nbsp; ← / → spawn ruby &nbsp;·&nbsp; Space splash</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ── Renderer ────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* ── Scene / Camera ──────────────────────── */
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x90c8d8, 0.035);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 120);
camera.position.set(0, 1.6, 0);

/* ── Lights ──────────────────────────────── */
const sun = new THREE.DirectionalLight(0xfffbe8, 1.4);
sun.position.set(30, 60, -20);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xb0d8f0, 0.8));

/* ── Ground ──────────────────────────────── */
const texLoader = new THREE.TextureLoader();
function loadTex(path, repeat = [12, 600]) {
  const t = texLoader.load(path);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(...repeat);
  return t;
}
const GROUND_BASE = '../../models/textures/ground/';
const groundColorTex  = loadTex(GROUND_BASE + 'Grass001_1K_Color.jpg');
const groundRoughTex  = loadTex(GROUND_BASE + 'Grass001_1K_Roughness.jpg');
const groundNormalTex = loadTex(GROUND_BASE + 'Grass001_1K_Normal.jpg');

const groundGeo = new THREE.PlaneGeometry(200, 10000, 1, 1);
const groundMat = new THREE.MeshStandardMaterial({
  map:         groundColorTex,
  roughnessMap:groundRoughTex,
  normalMap:   groundNormalTex,
  normalScale: new THREE.Vector2(1.2, 1.2),
  roughness:   1.0,
  metalness:   0.0,
});
const ground    = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/* ── Path ────────────────────────────────── */
// Procedural dirt-track texture: warm sandy base + darker tyre-track strips
const PATH_W = 512, PATH_H = 512;
const pathCanvas = document.createElement('canvas');
pathCanvas.width  = PATH_W;
pathCanvas.height = PATH_H;
const ctx = pathCanvas.getContext('2d');

// Base sandy dirt
ctx.fillStyle = '#c8b080';
ctx.fillRect(0, 0, PATH_W, PATH_H);

// Subtle noise grain
for (let i = 0; i < 18000; i++) {
  const x = Math.random() * PATH_W;
  const y = Math.random() * PATH_H;
  const r = Math.random() * 2.5;
  const v = Math.floor(130 + Math.random() * 60);
  ctx.fillStyle = `rgba(${v},${Math.floor(v*0.78)},${Math.floor(v*0.5)},0.35)`;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

// Two tyre tracks (darker compressed earth)
const trackColor = 'rgba(90,65,35,0.55)';
ctx.fillStyle = trackColor;
ctx.fillRect(PATH_W * 0.18, 0, PATH_W * 0.14, PATH_H); // left track
ctx.fillRect(PATH_W * 0.68, 0, PATH_W * 0.14, PATH_H); // right track

// Faint centre ridge (lighter dust)
ctx.fillStyle = 'rgba(220,200,150,0.25)';
ctx.fillRect(PATH_W * 0.42, 0, PATH_W * 0.16, PATH_H);

// Occasional pebbles
for (let i = 0; i < 120; i++) {
  const px = Math.random() * PATH_W;
  const py = Math.random() * PATH_H;
  const pr = 1.5 + Math.random() * 3.5;
  ctx.fillStyle = `rgba(100,85,65,${0.3 + Math.random() * 0.4})`;
  ctx.beginPath(); ctx.ellipse(px, py, pr, pr * 0.7, Math.random() * Math.PI, 0, Math.PI * 2); ctx.fill();
}

const pathTex = new THREE.CanvasTexture(pathCanvas);
pathTex.wrapS = THREE.RepeatWrapping;
pathTex.wrapT = THREE.RepeatWrapping;
pathTex.repeat.set(1, 3000);   // 1 tile per ~3 units along path length

const pathGeo = new THREE.PlaneGeometry(3.2, 10000, 1, 1);
const pathMat = new THREE.MeshStandardMaterial({
  map:          pathTex,
  roughness:    0.92,
  metalness:    0.0,
});
const path    = new THREE.Mesh(pathGeo, pathMat);
path.rotation.x = -Math.PI / 2;
path.position.y  = 0.012;
path.receiveShadow = true;
scene.add(path);

/* ── Clouds ──────────────────────────────── */
function makeCloud(x, y, z) {
  const g   = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const blobs = [
    [0, 0, 0, 2.5, 1.2, 2],
    [-2, -0.2, 0, 2, 1, 1.8],
    [ 2, -0.3, 0, 2, 1, 1.8],
    [0.8, 0.5, 0, 1.5, 0.8, 1.5],
  ];
  for (const [px, py, pz, sx, sy, sz] of blobs) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz, 2, 2, 2), mat);
    mesh.position.set(px, py, pz);
    g.add(mesh);
  }
  g.position.set(x, y, z);
  return g;
}

const clouds = [];
for (let i = 0; i < 40; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 120,
    12 + Math.random() * 10,
    -400 + i * 50 + Math.random() * 30
  );
  scene.add(c);
  clouds.push(c);
}

/* ── Load GLB tree models ────────────────── */
// Paths are relative to this page (scenes/hello-world/) → ../../models/trees/
const TREE_MODELS_BASE = '../../models/trees/';
const MODEL_FILES = [
  'tree_default.glb',
  'tree_oak.glb',
  'tree_cone.glb',
];

const loader = new GLTFLoader();

function loadGLB(url) {
  return new Promise((resolve, reject) => loader.load(url, resolve, undefined, reject));
}

async function main() {
  /* Load all models */
  const gltfs = await Promise.all(
    MODEL_FILES.map(f => loadGLB(TREE_MODELS_BASE + f))
  );

  // Extract scene roots and enable shadows
  const prototypes = gltfs.map(g => {
    const root = g.scene;
    root.traverse(n => {
      if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
    });
    // Normalise: scale to roughly 4 units tall
    const box = new THREE.Box3().setFromObject(root);
    const h   = box.max.y - box.min.y;
    const s   = 4.0 / h;
    root.scale.setScalar(s);
    // Snap base to y=0
    box.setFromObject(root);
    root.position.y -= box.min.y;
    return root;
  });

  /* ── Place tree pool ─────────────────────── */
  // Rows along the path; multiple columns per side to fill the forest
  const TREE_SPACING = 5;
  const TREE_ROWS    = 60;
  const HALF_Z       = (TREE_ROWS * TREE_SPACING) / 2;
  const CYCLE        = TREE_ROWS * TREE_SPACING;

  const treePool = [];

  function spawnTree(x, z, scaleBoost = 1) {
    const proto = prototypes[Math.floor(Math.random() * prototypes.length)];
    const inst  = proto.clone();
    inst.position.set(x, 0, z);
    inst.rotation.y = Math.random() * Math.PI * 2;
    const sv = (0.85 + Math.random() * 0.4) * scaleBoost;
    inst.scale.multiplyScalar(sv);
    scene.add(inst);
    return inst;
  }

  // Column layout per side: [xMin, xMax, count] — path edge is at ±1.6
  // Row 0 = tight against path, rows go outward. Deeper rows get bigger trees.
  const COLUMNS = [
    { xMin: 2.2,  xMax: 5.5,  scale: 1.0  },  // front row, tight
    { xMin: 5.5,  xMax: 10.0, scale: 1.15 },  // second row
    { xMin: 10.0, xMax: 17.0, scale: 1.3  },  // third row
    { xMin: 17.0, xMax: 27.0, scale: 1.5  },  // deep forest
    { xMin: 27.0, xMax: 40.0, scale: 1.7  },  // far edge, large silhouettes
  ];

  for (let i = 0; i < TREE_ROWS; i++) {
    const z = -HALF_Z + i * TREE_SPACING;
    for (const col of COLUMNS) {
      const jitter = (Math.random() - 0.5) * 3;
      const x = col.xMin + Math.random() * (col.xMax - col.xMin);
      treePool.push(spawnTree( x, z + jitter, col.scale));
      treePool.push(spawnTree(-x, z + jitter, col.scale));
    }
  }

  /* ── Hide loading screen ─────────────────── */
  const loadDiv = document.getElementById('loading');
  loadDiv.style.opacity = '0';
  setTimeout(() => loadDiv.remove(), 700);

  /* ── Input ───────────────────────────────── */
  const keys = {};
  window.addEventListener('keydown', e => { keys[e.key] = true; onKeyDown(e); });
  window.addEventListener('keyup',   e => keys[e.key] = false);

  let hintFaded = false;
  const hint = document.getElementById('hint');

  /* ── Ruby gems ───────────────────────────── */
  const rubyMat = new THREE.MeshPhysicalMaterial({
    color:        0xcc0022,
    emissive:     0x440008,
    roughness:    0.05,
    metalness:    0.0,
    transmission: 0.5,
    thickness:    0.5,
    reflectivity: 1.0,
    clearcoat:    1.0,
    clearcoatRoughness: 0.05,
  });
  const rubyGeo = new THREE.OctahedronGeometry(0.28, 0);

  const rubies = [];   // { mesh, alive }

  function spawnRuby(side) {
    const x   = side * (1.8 + Math.random() * 0.4);  // close to path edge
    const z   = camZ - 18;                             // ahead in fog
    const gem = new THREE.Mesh(rubyGeo, rubyMat);
    gem.position.set(x, 0.3, z);
    gem.rotation.set(Math.random(), Math.random(), Math.random());
    scene.add(gem);
    rubies.push({ mesh: gem, alive: true });
  }

  /* ── Particle pool for splashes ──────────── */
  const PARTICLE_COUNT  = 300;
  const particleGeo     = new THREE.BufferGeometry();
  const pPositions      = new Float32Array(PARTICLE_COUNT * 3);
  const pColors         = new Float32Array(PARTICLE_COUNT * 3);
  particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
  particleGeo.setAttribute('color',    new THREE.BufferAttribute(pColors, 3));
  const particleMat = new THREE.PointsMaterial({
    size:            0.18,
    sizeAttenuation: true,
    transparent:     true,
    opacity:         1.0,
    depthWrite:      false,
    vertexColors:    true,
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  particles.visible = false;
  scene.add(particles);

  const pVel = Array.from({ length: PARTICLE_COUNT }, () => new THREE.Vector3());
  let   pLife     = 0;
  const P_DURATION = 2.0;

  // Palette of ruby-burst colours: deep reds, hot pinks, gold sparks, white glints
  const RUBY_PALETTE = [
    [1.0, 0.05, 0.15],
    [1.0, 0.2,  0.3 ],
    [0.9, 0.0,  0.05],
    [1.0, 0.55, 0.1 ],
    [1.0, 0.85, 0.2 ],
    [1.0, 1.0,  1.0 ],
    [0.7, 0.0,  0.2 ],
    [1.0, 0.3,  0.5 ],
  ];

  function splashRuby() {
    // Find closest alive ruby — no distance limit
    let best = null, bestDist = Infinity;
    for (const r of rubies) {
      if (!r.alive) continue;
      const d = Math.abs(r.mesh.position.z - camZ);
      if (d < bestDist) { best = r; bestDist = d; }
    }
    if (!best) return;

    const origin = best.mesh.position;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      pPositions[i * 3]     = origin.x;
      pPositions[i * 3 + 1] = origin.y;
      pPositions[i * 3 + 2] = origin.z;

      // Mix of tight core burst and wide sparks
      const fast = Math.random() < 0.3;
      const speed = fast ? 10 + Math.random() * 8 : 3 + Math.random() * 6;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.random() * Math.PI;
      pVel[i].set(
        Math.sin(phi) * Math.cos(theta) * speed,
        Math.abs(Math.cos(phi)) * speed * 1.2 + Math.random() * 3,
        Math.sin(phi) * Math.sin(theta) * speed
      );

      const col = RUBY_PALETTE[Math.floor(Math.random() * RUBY_PALETTE.length)];
      pColors[i * 3]     = col[0];
      pColors[i * 3 + 1] = col[1];
      pColors[i * 3 + 2] = col[2];
    }
    particleGeo.attributes.position.needsUpdate = true;
    particleGeo.attributes.color.needsUpdate    = true;
    particles.visible   = true;
    particleMat.opacity = 1.0;
    pLife = P_DURATION;

    scene.remove(best.mesh);
    best.alive = false;
  }

  function onKeyDown(e) {
    if (e.key === 'ArrowLeft')  spawnRuby(-1);
    if (e.key === 'ArrowRight') spawnRuby(1);
    if (e.key === ' ')          splashRuby();
  }

  /* ── Animation loop ──────────────────────── */
  const SPEED = 5;
  const clock = new THREE.Clock();
  let   camZ  = 0;

  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();

    const moving =
      keys['ArrowUp']   || keys['w'] || keys['W'] ||
      keys['ArrowDown'] || keys['s'] || keys['S'];

    if (moving && !hintFaded) {
      hint.style.opacity = '0';
      hintFaded = true;
    }

    if (keys['ArrowUp']   || keys['w'] || keys['W']) camZ -= SPEED * dt;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) camZ += SPEED * dt;

    camera.position.z = camZ;

    // Spin rubies gently
    for (const r of rubies) {
      if (!r.alive) continue;
      r.mesh.rotation.y += dt * 1.8;
      r.mesh.rotation.x += dt * 0.6;
      // bob up and down
      r.mesh.position.y = 0.3 + Math.sin(Date.now() * 0.002 + r.mesh.position.x) * 0.12;
    }

    // Animate splash particles
    if (pLife > 0) {
      pLife -= dt;
      const t = 1 - pLife / P_DURATION;
      particleMat.opacity = Math.max(0, 1 - t * t * 1.5);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        pPositions[i * 3]     += pVel[i].x * dt;
        pPositions[i * 3 + 1] += (pVel[i].y - 9.8 * t * 1.2) * dt; // gravity
        pPositions[i * 3 + 2] += pVel[i].z * dt;
      }
      particleGeo.attributes.position.needsUpdate = true;
      if (pLife <= 0) particles.visible = false;
    }

    // Wrap tree pool
    for (const tree of treePool) {
      const rel = tree.position.z - camZ;
      if (rel > CYCLE / 2)  tree.position.z -= CYCLE;
      if (rel < -CYCLE / 2) tree.position.z += CYCLE;
    }

    // Drift clouds
    for (const cloud of clouds) {
      cloud.position.x += 0.5 * dt;
      if (cloud.position.x > 60) cloud.position.x = -60;
      const relZ = cloud.position.z - camZ;
      if (relZ > 1000) cloud.position.z -= 2000;
      if (relZ < -1000) cloud.position.z += 2000;
    }

    renderer.render(scene, camera);
  }

  animate();
}

main().catch(console.error);

/* ── Resize ──────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
  </script>
</body>
</html>
