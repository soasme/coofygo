<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World – coofygo</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #87ceeb; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.8rem;
      padding: 8px 18px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      pointer-events: none;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <div id="hint">↑ / ↓ — walk forward / backward</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
import * as THREE from 'three';

/* ── Renderer ────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* ── Scene / Camera ──────────────────────── */
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog        = new THREE.Fog(0x87ceeb, 30, 90);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 120);
camera.position.set(0, 1.6, 0);

/* ── Lights ──────────────────────────────── */
const sun = new THREE.DirectionalLight(0xfffbe8, 1.4);
sun.position.set(30, 60, -20);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xb0d8f0, 0.7));

/* ── Ground ──────────────────────────────── */
const groundGeo  = new THREE.PlaneGeometry(40, 400, 8, 80);
const groundMat  = new THREE.MeshLambertMaterial({ color: 0x4a7c3f });
const ground     = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/* ── Path ────────────────────────────────── */
const pathGeo = new THREE.PlaneGeometry(3.2, 400, 1, 80);
const pathMat = new THREE.MeshLambertMaterial({ color: 0xd4c4a0 });
const path    = new THREE.Mesh(pathGeo, pathMat);
path.rotation.x = -Math.PI / 2;
path.position.y  = 0.01;
path.receiveShadow = true;
scene.add(path);

/* ── Low-poly tree factory ───────────────── */
function makeTree(x, z) {
  const g = new THREE.Group();

  // trunk
  const trunkGeo = new THREE.CylinderGeometry(0.12, 0.18, 1.2, 5);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
  const trunk    = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 0.6;
  trunk.castShadow = true;
  g.add(trunk);

  // foliage — three stacked cones for low-poly look
  const colors   = [0x2d6a2d, 0x3a7d3a, 0x256025];
  const sizes    = [[0.9, 1.4], [0.7, 1.1], [0.5, 0.9]];
  const offsets  = [0, 0.8, 1.4];
  for (let i = 0; i < 3; i++) {
    const cGeo = new THREE.ConeGeometry(sizes[i][0], sizes[i][1], 6);
    const cMat = new THREE.MeshLambertMaterial({ color: colors[i] });
    const cone = new THREE.Mesh(cGeo, cMat);
    cone.position.y = 1.4 + offsets[i] + sizes[i][1] / 2;
    cone.castShadow = true;
    g.add(cone);
  }

  g.position.set(x, 0, z);
  // slight random tilt
  g.rotation.z = (Math.random() - 0.5) * 0.08;
  return g;
}

/* ── Populate trees along the path ──────── */
const TREE_SPACING = 6;
const TREE_ROWS    = 60;
const HALF_Z       = (TREE_ROWS * TREE_SPACING) / 2;

const treePool = [];
for (let i = 0; i < TREE_ROWS; i++) {
  const z = -HALF_Z + i * TREE_SPACING;
  // left side
  const tL = makeTree(-3.5 - Math.random() * 2.5, z + (Math.random() - 0.5) * 2);
  // right side
  const tR = makeTree( 3.5 + Math.random() * 2.5, z + (Math.random() - 0.5) * 2);
  scene.add(tL, tR);
  treePool.push(tL, tR);
}

/* ── Clouds ──────────────────────────────── */
function makeCloud(x, y, z) {
  const g   = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const positions = [
    [0, 0, 0, 2.5, 1.2, 2],
    [-2, -0.2, 0, 2, 1, 1.8],
    [ 2, -0.3, 0, 2, 1, 1.8],
    [0.8, 0.5, 0, 1.5, 0.8, 1.5],
  ];
  for (const [px, py, pz, sx, sy, sz] of positions) {
    const geo  = new THREE.BoxGeometry(sx, sy, sz, 2, 2, 2);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(px, py, pz);
    g.add(mesh);
  }
  g.position.set(x, y, z);
  return g;
}

const clouds = [];
for (let i = 0; i < 10; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 60,
    14 + Math.random() * 6,
    -100 + i * 40 + Math.random() * 20
  );
  scene.add(c);
  clouds.push(c);
}

/* ── Input ───────────────────────────────── */
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup',   e => keys[e.key] = false);

// Fade hint after first movement
let hintFaded = false;
const hint = document.getElementById('hint');

/* ── Infinite scrolling helpers ─────────── */
const CYCLE = TREE_ROWS * TREE_SPACING;

/* ── Animation loop ──────────────────────── */
const SPEED   = 5;    // units/second
const clock   = new THREE.Clock();
let   camZ    = 0;    // total world distance travelled

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  const moving =
    keys['ArrowUp']   || keys['w'] || keys['W'] ||
    keys['ArrowDown'] || keys['s'] || keys['S'];

  if (moving && !hintFaded) {
    hint.style.opacity = '0';
    hintFaded = true;
  }

  if (keys['ArrowUp']   || keys['w'] || keys['W']) camZ -= SPEED * dt;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) camZ += SPEED * dt;

  camera.position.z = camZ;

  // Wrap trees: move a tree chunk behind camera if it's too far ahead,
  // and pull chunks in front if moving backward.
  for (const tree of treePool) {
    const rel = tree.position.z - camZ;
    if (rel > CYCLE / 2)  tree.position.z -= CYCLE;
    if (rel < -CYCLE / 2) tree.position.z += CYCLE;
  }

  // Drift clouds slowly
  for (const cloud of clouds) {
    cloud.position.x += 0.5 * dt;
    if (cloud.position.x > 40) cloud.position.x = -40;
  }

  renderer.render(scene, camera);
}

animate();

/* ── Resize ──────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
  </script>
</body>
</html>
