<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coofygo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    h1 {
      font-size: 3.5rem;
      letter-spacing: 0.15em;
      font-weight: 300;
      color: #e8f4f8;
    }
    .scenes {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      display: block;
      width: 220px;
      background: #12151a;
      border: 1px solid #2a2e38;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: #fff;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: #6ec6e6;
      transform: translateY(-3px);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 8px; font-weight: 500; }
    .card p  { font-size: 0.85rem; color: #8a9aaa; line-height: 1.5; }
    .card .tag {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6ec6e6;
    }
  </style>
</head>
<body>
  <h1>coofygo</h1>
  <div class="scenes">
    <a class="card" href="scenes/hello-world/">
      <h2>Hello World</h2>
      <p>Walk forever through a low-poly forest. Blue sky, white clouds, an endless path.</p>
      <span class="tag">three.js · interactive</span>
    </a>
  </div>
</body>
</html>
